            {i<2?<div style={{width:12,height:12,background:it[0],borderRadius:2}}></div>:<div style={{width:22,height:2,background:"#f59e0b",display:"inline-block"}}></div>}{it[1]}</div>;

        {[0,1,2,3,4,5].map(function(v){return <text key={v} x={pL-6} y={pT+cH-(v/5)*cH+4} textAnchor="end" fill={lc} fontSize="10">${v}B</text>; })}
        {[40,45,50,55,60].map(function(v){return <text key={v} x={W-pR+6} y={pT+cH-((v-35)/30)*cH+4} textAnchor="start" fill="#f59e0b" fontSize="10" opacity="0.85">{v}%</text>; })}
        {SCALE_DATA.map(function(d,i){

   standout:"BAM generates $3B+ per year in free cash without owning a single asset on its balance sheet. It needs no capital markets access to keep running. That combination — capital-light, recurring, high-margin, self-funding — is genuinely rare in financial services."},
  {id:4,label:"Customer Stickiness",score:3,verdict:"Mostly structural, not earned — returns are the real dependency",color:"#b45309",icon:"🔒",
   points:[
     "87% perpetual capital creates structural stickiness — most LPs contractually cannot redeem. But lock-in is not the same as loyalty. The reason behind the stickiness matters.",
     "LP retention is deeply tied to returns performance. A sustained period of underperformance would test re-up rates significantly. The stickiness is contingent, not unconditional.",
     "Real estate post-COVID is the evidence: friction with office LPs showed that when BAM’s product underdelivered, stickiness eroded. The vehicle had the lock-in, but not the love.",
   ],
   standout:"The perpetual capital base protects BAM from short-term LP exits — but it also means the genuine test of stickiness (do LPs choose to re-invest?) is deferred. The wealth management channel is the place to watch: those clients can leave easily, and if they stay, it means the product is genuinely loved. That number is still small relative to the institutional base."},
];

const RadarChart = ({ scores, colors, labels }) => {
  var cx=120, cy=110, r=80, n=scores.length;
  var pts = scores.map(function(s,i){
    var a=(i*(2*Math.PI/n))-(Math.PI/2);
    var sr=(s/5)*r;
    return {x:cx+sr*Math.cos(a),y:cy+sr*Math.sin(a),lx:cx+(r+22)*Math.cos(a),ly:cy+(r+22)*Math.sin(a)};
  });
  var web=[1,2,3,4,5].map(function(ring){
    return Array.from({length:n},function(_,i){
      var a=(i*(2*Math.PI/n))-(Math.PI/2);
      return (cx+(ring/5)*r*Math.cos(a))+","+(cy+(ring/5)*r*Math.sin(a));
    }).join(" ");
  });
  var shape=pts.map(function(p){return p.x+","+p.y;}).join(" ");
  return (
    <svg viewBox="0 0 240 220" style={{width:220,height:200,display:"block",margin:"0 auto"}}>
      {web.map(function(w,i){return <polygon key={i} points={w} fill="none" stroke="var(--border)" strokeWidth={i===4?1.5:0.7}/>;}) }
      {Array.from({length:n},function(_,i){
        var a=(i*(2*Math.PI/n))-(Math.PI/2);
        return <line key={i} x1={cx} y1={cy} x2={cx+r*Math.cos(a)} y2={cy+r*Math.sin(a)} stroke="var(--border)" strokeWidth={0.7}/>;
      })}
      <polygon points={shape} fill="var(--accent)" fillOpacity={0.15} stroke="var(--accent)" strokeWidth={2}/>
      {pts.map(function(p,i){return <circle key={i} cx={p.x} cy={p.y} r={4} fill={colors[i]}/>;}) }
      {pts.map(function(p,i){
        var a=(i*(2*Math.PI/n))-(Math.PI/2);
        var anchor=Math.cos(a)>0.1?"start":Math.cos(a)<-0.1?"end":"middle";
        return <text key={i} x={p.lx} y={p.ly+(Math.sin(a)>0.3?4:-4)} textAnchor={anchor} fontSize={8.5} fontWeight={700} fill={colors[i]}>{labels[i]}</text>;
      })}
      <text x={cx} y={cy+3} textAnchor="middle" fontSize={8} fill="var(--text-4)">BAM</text>
    </svg>
  );
};

const WeightEditor = ({ weights, setWeights, qualities }) => {
  const [weOpen, setWeOpen] = useState(false);
  var total = weights.reduce(function(a,b){return a+b;},0);
  var valid = total === 100;
  var handleWChange = function(idx, val) {
    var v = parseInt(val, 10);
    if (isNaN(v) || v < 0) v = 0;
    if (v > 100) v = 100;
    setWeights(function(prev){var next=prev.slice();next[idx]=v;return next;});
  };
  var normalize = function() {
    var tot = weights.reduce(function(a,b){return a+b;},0);
    if (tot === 0) return;
    var norm = weights.map(function(w){return Math.round(w/tot*100);});
    var diff = 100 - norm.reduce(function(a,b){return a+b;},0);
    norm[0] = norm[0] + diff;
    setWeights(norm);
  };
  var equalW = function() {
    var n = weights.length;
    var eq = Math.floor(100/n);
    var rem = 100 - eq*n;
    setWeights(weights.map(function(_,j){return eq+(j===0?rem:0);}));
  };
  return (
    <div>
      <div onClick={function(){setWeOpen(!weOpen);}} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"9px 14px",background:"var(--bg-deep)",border:"1px solid var(--border)",borderRadius:weOpen?"8px 8px 0 0":"8px",userSelect:"none"}}>
        <span style={{fontSize:13}}>⚖</span>
        <span style={{fontWeight:700,color:"var(--text-2)",fontSize:13}}>Adjust Weights</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:valid?"#16a34a":"#ef4444"}}>Total: {total}%</span>
          <span style={{color:"var(--text-4)",fontSize:12}}>{weOpen?"▲":"▼"}</span>
        </div>
      </div>
      {weOpen&&(
        <div style={{padding:"12px 14px",background:"var(--bg-inner)",border:"1px solid var(--border)",borderTop:"none",borderRadius:"0 0 8px 8px"}}>
          {qualities.map(function(q,i){
            return (
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:i<qualities.length-1?9:0}}>
                <span style={{fontSize:16,flexShrink:0}}>{q.icon}</span>
                <span style={{fontSize:11,fontWeight:700,color:q.color,width:90,flexShrink:0,lineHeight:1.3}}>{q.label}</span>
                <div style={{flex:1,height:5,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:Math.min(weights[i],100)+"%",background:q.color,borderRadius:3,transition:"width 0.2s"}}/>
                </div>
                <input type="number" min="0" max="100" value={weights[i]}
                  onChange={function(e){handleWChange(i,e.target.value);}}
                  style={{width:50,textAlign:"center",padding:"3px 6px",border:"1px solid var(--border)",borderRadius:5,background:"var(--bg-card)",color:"var(--text-1)",fontSize:12,fontWeight:700,fontFamily:"inherit",outline:"none"}}/>
                <span style={{fontSize:11,color:"var(--text-4)",flexShrink:0}}>%</span>
              </div>
            );
          })}
          {!valid&&<p style={{fontSize:11,color:"#ef4444",marginTop:8}}>{total<100?"Sum is "+total+"% — add "+(100-total)+"% more":"Sum is "+total+"% — reduce by "+(total-100)+"%"}</p>}
          <div style={{display:"flex",gap:7,marginTop:10}}>
            <button onClick={normalize} style={{padding:"4px 10px",borderRadius:5,border:"1px solid var(--border)",background:"var(--bg-btn)",color:"var(--text-2)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Normalize to 100%</button>
            <button onClick={equalW} style={{padding:"4px 10px",borderRadius:5,border:"1px solid var(--border)",background:"var(--bg-btn)",color:"var(--text-2)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Equal weights</button>
          </div>
        </div>
      )}
    </div>
  );
};

const Section6 = ({ dark }) => {
  const [open, setOpen] = useState(null);
  const [subOpen, setSubOpen] = useState(null);
  const [weights, setWeights] = useState([45,20,15,12,8]);
  var q = BAM_QUALITY;
  var scores = q.map(function(x){return x.score;});
  var colors = q.map(function(x){return x.color;});
  var labels = q.map(function(x){return x.label.split(" ")[0];});
  var totalW = weights.reduce(function(a,b){return a+b;},0);
  var weightedSum = 0;
  scores.forEach(function(s,i){weightedSum += s*weights[i];});
  var overallAvg = totalW>0?(weightedSum/totalW).toFixed(1):"0.0";
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* header strip */}
      <div className="card" style={{display:"flex",alignItems:"center",gap:20,padding:"12px 18px"}}>
        <RadarChart scores={scores} colors={colors} labels={labels}/>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:"var(--text-4)",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>Overall Quality Score</div>
          <div style={{fontSize:42,fontWeight:900,color:"var(--accent)",lineHeight:1}}>{overallAvg}<span style={{fontSize:18,color:"var(--text-4)"}}>/5</span></div>
          <div style={{fontSize:12,color:"var(--text-2)",marginTop:6,lineHeight:1.6}}>Evaluated against a personal framework: Pricing Power as the master signal, supported by four structural pillars, people &amp; adaptability, cash generation, and customer stickiness.</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:10}}>
            {q.map(function(item,i){
              var filled=Math.round(item.score);
              return <div key={i} style={{display:"flex",alignItems:"center",gap:5,background:"var(--bg-inner)",border:"1px solid var(--border)",borderRadius:6,padding:"4px 8px"}}>
                <span style={{fontSize:13}}>{item.icon}</span>
                <span style={{fontSize:10,fontWeight:700,color:item.color}}>{item.label.split(" ")[0]}</span>
                <div style={{display:"flex",gap:2}}>
                  {[1,2,3,4,5].map(function(d){return <div key={d} style={{width:6,height:6,borderRadius:"50%",background:d<=filled?item.color:"var(--border)"}}/>;}) }
                </div>
              </div>;
            })}
          </div>
        </div>
      </div>

      {/* weight editor */}
      <WeightEditor weights={weights} setWeights={setWeights} qualities={q}/>

      {/* quality cards */}
      {q.map(function(item,i){
        var isOpen=open===i;
        return (
          <div key={i} style={{background:"var(--bg-card)",border:"1px solid "+(isOpen?item.color:"var(--border)"),borderRadius:8,overflow:"hidden",boxShadow:"var(--shadow-sm)",transition:"border-color 0.2s"}}>
            {/* header row */}
            <div onClick={function(){setOpen(isOpen?null:i);setSubOpen(null);}} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",cursor:"pointer"}}>
              <span style={{fontSize:20}}>{item.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,color:"var(--text-1)",fontSize:14}}>{item.label}</div>
                <div style={{fontSize:11,color:"var(--text-3)",marginTop:1}}>{item.verdict}</div>
              </div>
              <div style={{display:"flex",gap:3,marginRight:8}}>
                {[1,2,3,4,5].map(function(d){
                  var filled=d<=Math.floor(item.score);
                  var half=!filled&&d<=item.score+0.5&&item.score%1!==0;
                  return <div key={d} style={{width:10,height:10,borderRadius:"50%",background:filled?item.color:half?"linear-gradient(90deg,"+item.color+" 50%,var(--border) 50%)":"var(--border)",border:"1px solid "+(filled||half?item.color:"var(--border-mid)")}}/>;
                })}
              </div>
              <span style={{color:"var(--text-4)",fontSize:13,flexShrink:0}}>{isOpen?"▲":"▼"}</span>
            </div>

            {/* expanded body */}
            {isOpen&&<div style={{borderTop:"1px solid var(--border)",padding:"14px 16px",background:"var(--bg-inner)"}}>
              {/* supporting pillars: show sub-cards */}
              {item.subs?(
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {item.subs.map(function(sub,j){
                    var isS=subOpen===j;
                    return <div key={j} onClick={function(e){e.stopPropagation();setSubOpen(isS?null:j);}} style={{background:"var(--bg-card)",border:"1px solid "+(isS?sub.color:"var(--border)"),borderRadius:7,padding:"10px 13px",cursor:"pointer",transition:"border-color 0.2s"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:sub.color,flexShrink:0}}/>
                        <span style={{fontWeight:700,color:"var(--text-1)",fontSize:12,flex:1}}>{sub.name}</span>
                        <div style={{display:"flex",gap:2,marginRight:6}}>
                          {[1,2,3,4,5].map(function(d){return <div key={d} style={{width:7,height:7,borderRadius:"50%",background:d<=sub.score?sub.color:"var(--border)"}}/>;}) }
                        </div>
                        <span style={{color:"var(--text-4)",fontSize:11}}>{isS?"▲":"▼"}</span>
                      </div>
                      {isS&&<p style={{color:"var(--text-2)",fontSize:11,lineHeight:1.65,marginTop:8,paddingTop:8,borderTop:"1px solid var(--border)"}}>{sub.note}</p>}
                    </div>;
                  })}
                </div>
              ):(
                <div>
                  <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:12}}>
                    {item.points.map(function(pt,j){
                      return <div key={j} style={{display:"flex",gap:10,padding:"8px 10px",background:"var(--bg-card)",borderRadius:6,border:"1px solid var(--border)"}}>
                        <span style={{color:item.color,fontWeight:900,flexShrink:0,fontSize:12}}>→</span>
                        <span style={{color:"var(--text-2)",fontSize:12,lineHeight:1.55}}>{pt}</span>
                      </div>;
                    })}
                  </div>
                  <div style={{background:item.color+"14",border:"1px solid "+item.color+"44",borderLeft:"3px solid "+item.color,borderRadius:6,padding:"10px 12px"}}>
                    <div style={{fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:0.8,color:item.color,marginBottom:4}}>Standout</div>
                    <p style={{color:"var(--text-1)",fontSize:12,lineHeight:1.6,fontWeight:500}}>{item.standout}</p>
                  </div>
                </div>
              )}
            </div>}
          </div>
        );
      })}
    </div>
  );
};
