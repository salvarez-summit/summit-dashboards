    const SvgLineChart = ({ data, colors }) => {
      const [hovered, setHovered] = useState(null);
      const W = 520, H = 220;
      const pL = 44, pR = 16, pT = 12, pB = 44;
      const cW = W - pL - pR, cH = H - pT - pB;
      const firms = Object.keys(colors);
      const years = data.map(d => d.year);
      const xOf = i => pL + (i / (years.length - 1)) * cW;
      const yOf = v => pT + cH - (v / 100) * cH;
      const gridYs = [0, 25, 50, 75, 100];
      return (
        <div style={{ position:"relative" }}>
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", display:"block" }}>
            {/* grid */}
            {gridYs.map(v => (
              <g key={v}>
                <line x1={pL} x2={W - pR} y1={yOf(v)} y2={yOf(v)} stroke="#e2e8f0" strokeWidth={1} />
                <text x={pL - 5} y={yOf(v) + 4} fontSize={10} fill="#94a3b8" textAnchor="end">{v}%</text>
              </g>
            ))}
            {/* x labels */}
            {years.map((yr, i) => (
              <text key={yr} x={xOf(i)} y={H - pB + 14} fontSize={10} fill="#94a3b8" textAnchor="middle">{yr}</text>
            ))}
            {/* lines */}
            {firms.map(f => (
              <polyline key={f}
                points={data.map((d, i) => `${xOf(i)},${yOf(d[f])}`).join(' ')}
                fill="none" stroke={colors[f]} strokeWidth={hovered === f ? 3 : 2}
                opacity={hovered && hovered !== f ? 0.25 : 1}
                style={{ transition:"opacity 0.15s" }}
              />
            ))}
            {/* dots */}
            {firms.map(f => data.map((d, i) => (
              <circle key={`${f}-${i}`} cx={xOf(i)} cy={yOf(d[f])} r={3}
                fill={colors[f]} opacity={hovered && hovered !== f ? 0.2 : 1}
                style={{ transition:"opacity 0.15s" }}
              />
            )))}
            {/* hover value labels on last point */}
            {firms.map(f => {
              const last = data[data.length - 1];
              return (
                <text key={`lbl-${f}`} x={xOf(data.length - 1) + 5} y={yOf(last[f]) + 4}
                  fontSize={10} fontWeight={700} fill={colors[f]}
                  opacity={hovered && hovered !== f ? 0.2 : 1}>{last[f]}%</text>
              );
            })}
          </svg>
          {/* legend */}
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", justifyContent:"center", marginTop:4 }}>
            {firms.map(f => (
              <div key={f} onMouseEnter={() => setHovered(f)} onMouseLeave={() => setHovered(null)}
                style={{ display:"flex", alignItems:"center", gap:5, cursor:"default",
                  opacity: hovered && hovered !== f ? 0.35 : 1, transition:"opacity 0.15s" }}>
                <div style={{ width:20, height:3, background:colors[f], borderRadius:2 }} />
                <span style={{ fontSize:11, fontWeight:700, color:colors[f] }}>{f}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

                      <span style={{ color:G.muted }}>{k}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:22 }}>
                  {FIRMS.map(f=>(
                    <Card key={f.id} style={{ padding:"14px 18px" }}>
                      <div style={{ display:"grid", gridTemplateColumns:"150px 1fr 180px 200px", gap:14, alignItems:"center" }}>
                        <div>
                          <div style={{ fontSize:15, fontWeight:800, color:FC[f.id] }}>{f.id} — {f.name}</div>
                          <div style={{ fontSize:12, fontWeight:700 }}>{f.aum}</div>
                        </div>
                        <div>
                          <SegBar segs={SEG_MIX[f.id]} />
                          <div style={{ display:"flex", flexWrap:"wrap", gap:"3px 10px", marginTop:5 }}>
                            {Object.entries(SEG_MIX[f.id]).sort((a,b)=>b[1]-a[1]).map(([k,v])=>(
                              <span key={k} style={{ fontSize:10, color:G.muted }}>
                                <span style={{ color:SEG_COLORS_MAP[k], fontWeight:700 }}>■</span> {k} {v}%
                              </span>
                            ))}
                          </div>
                        </div>
                        <div><div style={{ fontSize:11, fontWeight:600 }}>{f.identity}</div></div>
                        <div><div style={{ fontSize:11, fontWeight:600 }}>{f.ceo}</div><div style={{ fontSize:10, color:G.muted }}>{f.ceoNote}</div></div>
                      </div>
                    </Card>
                  ))}
                </div>
                <Card style={{ borderLeft:"4px solid #0d9488", background:"#f0fdfa" }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#0f766e", marginBottom:8 }}>What to look for across tabs</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:16, fontSize:12, color:G.muted, lineHeight:1.7 }}>
                    <div><strong style={{ color:G.text }}>Credit ≠ credit</strong><br/>Apollo's 82% credit is mostly investment-grade via insurance. KKR's credit is moving into asset-based finance. BAM's is distressed/HY. Same word, three different business models.</div>
                    <div><strong style={{ color:G.text }}>PE is fragmenting</strong><br/>KKR/BX = traditional mega-cap LBO. Apollo de-emphasizing LBO for Hybrid Value. BAM = operational transformation, not financial engineering. Carlyle = global buyout + secondaries (AlpInvest).</div>
                    <div><strong style={{ color:G.text }}>Real assets = Brookfield's exclusive ground</strong><br/>Infrastructure + renewables at 125yr operational depth. KKR building fast but 10–15yr behind. Apollo barely participates. The least commoditized, hardest to replicate segment.</div>
                  </div>
                </Card>
              </div>
            )}

            {/* ── CREDIT ── */}
            {tab==="credit" && (
              <div>
                <div style={{ marginBottom:20 }}>
                  <SLabel>Credit Glossary — Click to expand</SLabel>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:8 }}>
                    {CREDIT_EDU.map((e,i)=>(
                      <div key={e.term} onClick={()=>setEduOpen(eduOpen===i?null:i)}
                        style={{ background:"white", border:`1px solid ${eduOpen===i?e.color:G.border}`, borderTop:`3px solid ${e.color}`, borderRadius:8, padding:"10px 12px", cursor:"pointer" }}>
                        <div style={{ fontSize:12, fontWeight:700, marginBottom:eduOpen===i?8:0 }}>{e.term}</div>
                        {eduOpen===i && (
                          <div>
                            <div style={{ fontSize:11, color:G.muted, lineHeight:1.6, marginBottom:6 }}>{e.def}</div>
                            <div style={{ display:"flex", gap:6 }}>
                              <Tag color="slate" small>Risk: {e.risk}</Tag>
                              <Tag color="green" small>Yield: {e.yield}</Tag>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                <SLabel>How Each Firm Plays Credit — Click to drill in</SLabel>
                <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:28 }}>
                  {CREDIT_FIRMS.map(f=>(
                    <FirmCard key={f.firm} f={f} segPct={f.pct} activeFirm={activeFirm} setActiveFirm={setActiveFirm} accentBg="#f0f6ff" />
                  ))}
                </div>

                {/* WHY CREDIT GREW */}
                <div style={{ borderTop:`2px solid ${G.border}`, paddingTop:22 }}>
                  <SLabel>Why All Five Firms Have Been Growing Credit as % of AUM</SLabel>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:10, marginBottom:18 }}>
                    {CREDIT_GROWTH_REASONS.slice(0,3).map(r=>(
                      <Card key={r.title} style={{ borderTop:"3px solid #2563eb" }}>
                        <div style={{ fontSize:18, marginBottom:6 }}>{r.icon}</div>
                        <div style={{ fontSize:12, fontWeight:700, marginBottom:6 }}>{r.title}</div>
                        <div style={{ fontSize:11, color:G.muted, lineHeight:1.65 }}>{r.body}</div>
                      </Card>
                    ))}
                  </div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20 }}>
                    {CREDIT_GROWTH_REASONS.slice(3).map(r=>(
                      <Card key={r.title} style={{ borderTop:"3px solid #2563eb" }}>
                        <div style={{ fontSize:18, marginBottom:6 }}>{r.icon}</div>
                        <div style={{ fontSize:12, fontWeight:700, marginBottom:6 }}>{r.title}</div>
                        <div style={{ fontSize:11, color:G.muted, lineHeight:1.65 }}>{r.body}</div>
                      </Card>
                    ))}
                  </div>

                  {/* Insurance deep-dive */}
                  <Card style={{ background:"#0f1e2e", border:"none", marginBottom:0 }}>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1.4fr", gap:24 }}>
                      <div>
                        <div style={{ color:"#5eead4", fontSize:13, fontWeight:800, marginBottom:10 }}>🛡️ Why insurance works better than direct credit fundraising</div>
                        <div style={{ color:"#94a3b8", fontSize:12, lineHeight:1.8 }}>
                          <p style={{ margin:"0 0 10px" }}><strong style={{ color:"white" }}>Traditional credit model:</strong> Raise a $10B credit fund → charge 1.5% fee → deploy over 3yr → capital repays over 5–7yr → go raise another fund. Repeat forever. Always dependent on LP sentiment, market conditions, and re-raise cycles.</p>
                          <p style={{ margin:"0 0 10px" }}><strong style={{ color:"white" }}>Insurance model:</strong> Own an insurer (life insurance + annuities) → collect premiums from millions of policyholders → you have a permanent, growing pool of capital at near-zero cost → invest it into your own credit products → earn the spread between what assets yield and what you owe policyholders → that spread = profit, compounding every year.</p>
                          <p style={{ margin:0 }}><strong style={{ color:"white" }}>Why it's structurally superior:</strong> (1) Capital never returns — it grows as new premiums come in. (2) You are your own LP — no fundraising treadmill. (3) Cost of capital is structurally lower than market rates. (4) You can do IG credit that earns 5–7% because your liabilities cost 2–3% — the spread works. Traditional credit managers can't do IG at scale because their cost of capital is too high.</p>
                        </div>
                      </div>
                      <div>
                        <div style={{ color:"#5eead4", fontSize:12, fontWeight:700, marginBottom:10, textTransform:"uppercase", letterSpacing:"0.06em" }}>Who has insurance exposure — maturity ranking</div>
                        {INSURANCE_FIRMS.map((f,i)=>(
                          <div key={f.firm} style={{ display:"flex", gap:12, alignItems:"flex-start", marginBottom:12, padding:"10px 12px", background:"#162840", borderRadius:8, borderLeft:`3px solid ${f.color}` }}>
                            <div style={{ fontSize:15, fontWeight:800, color:f.color, minWidth:40 }}>{f.firm}</div>
                            <div>
                              <div style={{ color:"white", fontSize:11, fontWeight:700 }}>{f.vehicle}</div>
                              <div style={{ color:"#64748b", fontSize:11 }}>{f.size}</div>
                              <div style={{ color:"#94a3b8", fontSize:10, marginTop:2 }}>{f.maturity}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </Card>
                </div>
              </div>
            )}

            {/* ── PE ── */}
            {tab==="pe" && (
              <div>
                <div style={{ marginBottom:20 }}>
                  <SLabel>PE Glossary — Click to expand</SLabel>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8 }}>
                    {PE_EDU.map((e,i)=>(
                      <div key={e.term} onClick={()=>setEduOpen(eduOpen===i?null:i)}
                        style={{ background:"white", border:`1px solid ${eduOpen===i?e.color:G.border}`, borderTop:`3px solid ${e.color}`, borderRadius:8, padding:"10px 12px", cursor:"pointer" }}>
                        <div style={{ fontSize:12, fontWeight:700, marginBottom:eduOpen===i?8:0 }}>{e.term}</div>
                        {eduOpen===i && (
                          <div>
                            <div style={{ fontSize:11, color:G.muted, lineHeight:1.6, marginBottom:6 }}>{e.def}</div>
                            <div style={{ display:"flex", gap:6 }}>
                              <Tag color="slate" small>Risk: {e.risk}</Tag>
                              <Tag color="orange" small>Target: {e.yield}</Tag>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
                <SLabel>How Each Firm Plays PE — Click to drill in</SLabel>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {PE_FIRMS.map(f=>(
                    <FirmCard key={f.firm} f={f} segPct={f.pct} activeFirm={activeFirm} setActiveFirm={setActiveFirm} accentBg="#fff7ed" />
                  ))}
                </div>
              </div>
            )}

            {/* ── REAL ASSETS ── */}
            {tab==="ra" && (
              <div>
                <div style={{ marginBottom:20 }}>
                  <SLabel>Real Assets Glossary — Click to expand</SLabel>
                  <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8 }}>
                    {RA_EDU.map((e,i)=>(
                      <div key={e.term} onClick={()=>setEduOpen(eduOpen===i?null:i)}
                        style={{ background:"white", border:`1px solid ${eduOpen===i?e.color:G.border}`, borderTop:`3px solid ${e.color}`, borderRadius:8, padding:"10px 12px", cursor:"pointer" }}>
                        <div style={{ fontSize:12, fontWeight:700, marginBottom:eduOpen===i?8:0 }}>{e.term}</div>
                        {eduOpen===i && (
                          <div>
                            <div style={{ fontSize:11, color:G.muted, lineHeight:1.6, marginBottom:6 }}>{e.def}</div>
                            <div style={{ display:"flex", gap:6 }}>
                              <Tag color="slate" small>Risk: {e.risk}</Tag>
                              <Tag color="green" small>Target: {e.yield}</Tag>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
                <SLabel>How Each Firm Plays Real Assets — Click to drill in</SLabel>
                <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:28 }}>
                  {RA_FIRMS.map(f=>(
                    <FirmCard key={f.firm} f={f} segPct={f.pct} activeFirm={activeFirm} setActiveFirm={setActiveFirm} accentBg="#f0fdf4" />
                  ))}
                </div>

                {/* ── HOW THEY EARN IN REAL ASSETS ── */}
                <div style={{ borderTop:`2px solid ${G.border}`, paddingTop:22 }}>
                  <SLabel>How Asset Managers Earn in Real Assets — The Revenue Model</SLabel>

                  {/* Three revenue streams */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:14 }}>
                    {[
                      { icon:"💼", title:"Management Fee", color:"#059669", bg:"#f0fdf4",
                        rate:"1.0–1.25% / yr",
                        body:"Charged annually on committed or invested capital. The stable, compounding base income. Lower rate than PE (1.5–2%) but the hold period is so much longer that total fee revenue per dollar of capital deployed is often higher. For perpetual vehicles (BIP, BEP, BREIT) this fee is theoretically infinite — it never stops as long as the vehicle exists.",
                        detail:"Example: A $10B infra fund at 1.1% held for 20yr = $2.2B in management fees. A $10B PE fund at 1.75% held for 7yr = $1.2B. The lower real assets rate wins on total lifetime revenue." },
                      { icon:"🏆", title:"Carried Interest (Performance Fee)", color:"#d97706", bg:"#fefce8",
                        rate:"12.5–20% above 8% hurdle",
                        body:"The manager's share of profits above a minimum return threshold (hurdle rate, typically 8% IRR). In real assets, carry is the slowest-realizing revenue of the three. Infrastructure and renewable assets are held 15–25 years before sale, so carry accumulates for decades before you see it. But when a $5B infrastructure asset sold after 20 years at 12% IRR returns $19B, the carry on $14B of gain is transformational.",
                        detail:"The long hold is a double-edged sword: carry takes longest to realize, but the compounding means the gain pool is much larger than in PE. Investors who understand this are patient; others underestimate it." },
                      { icon:"⚙️", title:"Transaction + Monitoring + Vehicle Fees", color:"#0891b2", bg:"#f0f9ff",
                        rate:"0.5–1% on deal size (one-time)",
                        body:"Three additional fee layers: (1) Transaction fees — charged to the portfolio company at deal close for structuring and advisory, typically 0.5–1% of deal value. (2) Monitoring fees — annual fees charged to portfolio companies for ongoing management services (often shared/rebated to LPs per fund agreement). (3) Vehicle-specific fees — BAM uniquely earns Incentive Distribution Rights (IDRs) from BIP and BEP: a growing % of cash distributions as the vehicle hits return thresholds. This is separate from fund carry and grows as the vehicle grows.",
                        detail:"BAM's IDR model from listed vehicles is structurally different from standard fund carry — it is a perpetual, growing income stream tied to the vehicle's distribution growth, not a one-time exit event." },
                    ].map(r=>(
                      <div key={r.title} style={{ background:r.bg, border:`1px solid ${G.border}`, borderTop:`3px solid ${r.color}`, borderRadius:10, padding:"16px 16px" }}>
                        <div style={{ fontSize:20, marginBottom:6 }}>{r.icon}</div>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                          <div style={{ fontSize:13, fontWeight:700 }}>{r.title}</div>
                          <span style={{ fontSize:11, fontWeight:700, color:r.color, background:"white", padding:"2px 8px", borderRadius:4, border:`1px solid ${r.color}30` }}>{r.rate}</span>
                        </div>
                        <div style={{ fontSize:11, color:G.muted, lineHeight:1.65, marginBottom:10 }}>{r.body}</div>
                        <div style={{ fontSize:10, color:r.color, fontWeight:600, background:"white", padding:"7px 10px", borderRadius:6, lineHeight:1.5 }}>→ {r.detail}</div>
                      </div>
                    ))}
                  </div>

                  {/* Comparison table */}
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:11, fontWeight:700, color:G.muted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:8 }}>Fee Economics Compared — Real Assets vs PE vs Credit</div>
                    <Card style={{ padding:0, overflow:"hidden" }}>
                      <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
                        <thead>
                          <tr style={{ background:"#f8fafc" }}>
                            {["Segment","Mgmt Fee","Carry / Perf Fee","Avg Hold Period","Fee Revenue Visibility","Carry Speed"].map(h=>(
                              <th key={h} style={{ padding:"10px 14px", textAlign:"left", fontWeight:700, color:G.muted, borderBottom:`1px solid ${G.border}`, whiteSpace:"nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[
                            { seg:"Infrastructure", mgmt:"1.0–1.25%", carry:"12.5–15% above 8%", hold:"15–25yr", vis:"🟢 Very High", speed:"🔴 Very Slow", bg:"#f0fdf4" },
                            { seg:"Renewable Power", mgmt:"1.0–1.25%", carry:"12.5–15% above 8%", hold:"15–25yr", vis:"🟢 Very High", speed:"🔴 Very Slow", bg:"#f0fdf4" },
                            { seg:"Real Estate (Oppty)", mgmt:"1.25–1.5%", carry:"20% above 8%", hold:"5–7yr", vis:"🟡 Medium", speed:"🟡 Medium", bg:"white" },
                            { seg:"Real Estate Core+", mgmt:"1.0–1.25%", carry:"10–12.5% above 8%", hold:"Perpetual", vis:"🟢 Very High", speed:"🔴 Very Slow", bg:"#f0fdf4" },
                            { seg:"Private Equity", mgmt:"1.5–2.0%", carry:"20% above 8%", hold:"5–7yr", vis:"🟡 Medium", speed:"🟡 Medium", bg:"#fff7ed" },
                            { seg:"Credit (Direct Lending)", mgmt:"1.0–1.5%", carry:"10–15%", hold:"3–5yr / perpetual", vis:"🟢 High", speed:"🟢 Fast", bg:"#eff6ff" },
                          ].map((row,i)=>(
                            <tr key={row.seg} style={{ background:row.bg, borderBottom:`1px solid ${G.border}` }}>
                              <td style={{ padding:"9px 14px", fontWeight:600 }}>{row.seg}</td>
                              <td style={{ padding:"9px 14px", color:G.muted }}>{row.mgmt}</td>
                              <td style={{ padding:"9px 14px", color:G.muted }}>{row.carry}</td>
                              <td style={{ padding:"9px 14px", color:G.muted }}>{row.hold}</td>
                              <td style={{ padding:"9px 14px" }}>{row.vis}</td>
                              <td style={{ padding:"9px 14px" }}>{row.speed}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </Card>
                  </div>

                  {/* Dark callout — the dual-role distinction */}
                  <Card style={{ background:"#0f1e2e", border:"none" }}>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
                      <div>
                        <div style={{ color:"#5eead4", fontSize:13, fontWeight:800, marginBottom:10 }}>🔑 The Critical Distinction: Asset Manager vs Asset Owner</div>
                        <div style={{ color:"#94a3b8", fontSize:12, lineHeight:1.8 }}>
                          <p style={{ margin:"0 0 10px" }}><strong style={{ color:"white" }}>As an asset MANAGER (BAM, BX, KKR, etc.):</strong> You earn management fees + carry on the third-party LP capital you manage. The actual operating income from the assets — the toll revenues, the power revenues, the rental income — flows to the fund (i.e., the LPs). You earn a fee on top of managing it.</p>
                          <p style={{ margin:0 }}><strong style={{ color:"white" }}>As an asset OWNER (Brookfield Corporation / BN):</strong> In addition to earning fees as BAM, BN also owns a 25–35% GP/co-investment stake in BIP, BEP, and BBU. So BN earns BOTH the management fee (via BAM) AND a share of the actual operating income from owning the assets. This dual role is what makes the Brookfield structure uniquely powerful — and it's specific to BN, not a feature of the pure-play asset manager BAM.</p>
                        </div>
                      </div>
                      <div>
                        <div style={{ color:"#5eead4", fontSize:13, fontWeight:800, marginBottom:10 }}>⏱️ Why Patience Matters in Real Assets Carry</div>
                        <div style={{ color:"#94a3b8", fontSize:12, lineHeight:1.8 }}>
                          <p style={{ margin:"0 0 10px" }}>The slow carry realization in infrastructure and renewables is frequently misunderstood as a weakness. It is actually a hidden strength. Here is why:</p>
                          <p style={{ margin:"0 0 10px" }}><strong style={{ color:"white" }}>Compounding time horizon:</strong> An asset bought at $3B growing at 11% for 20yr is worth $22B at exit. The carry pool on $19B of gain at 15% = $2.85B from one deal. A PE fund holding a company for 6yr at 25% IRR on a $3B deal generates ~$5B exit and $1B carry on $2B gain. The math favors patience at scale.</p>
                          <p style={{ margin:0 }}><strong style={{ color:"white" }}>Inflation linkage:</strong> Real asset revenues grow with inflation (toll roads, utilities, PPAs often have CPI escalators). So the longer you hold, the larger the absolute asset value. Carry compounds with inflation — something PE and credit do not have.</p>
                        </div>
                      </div>
                    </div>
                  </Card>
                </div>
              </div>
            )}

            {/* ── PERPETUAL CAPITAL ── */}
            {tab==="perpetual" && (
              <div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1.1fr", gap:20, marginBottom:24 }}>
                  <div>
                    <SLabel>Perpetual / Long-Dated Capital as % of AUM — 2019 to 2024</SLabel>
                    <Card style={{ padding:"16px 14px 12px" }}>
                      <SvgLineChart data={PERP_EVOLUTION} colors={FC} />
                    </Card>
                  </div>
                  <div>
                    <SLabel>Current Perpetual Capital — Snapshot</SLabel>
                    <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                      {PERP_FIRMS.map(f=>(
                        <Card key={f.firm} style={{ padding:"12px 16px" }}>
                          <div style={{ display:"grid", gridTemplateColumns:"60px 1fr 100px", gap:12, alignItems:"center" }}>
                            <div style={{ fontSize:14, fontWeight:800, color:FC[f.firm] }}>{f.firm}</div>
                            <div>
                              <div style={{ height:10, background:"#f1f5f9", borderRadius:5, overflow:"hidden", marginBottom:4 }}>
                                <div style={{ width:`${f.perpPct}%`, height:"100%", background:FC[f.firm], borderRadius:5 }} />
                              </div>
                              <div style={{ fontSize:10, color:G.muted }}>{f.perpAmt}</div>
                            </div>
                            <div style={{ textAlign:"right" }}>
                              <div style={{ fontSize:18, fontWeight:800, color:FC[f.firm] }}>{f.perpPct}%</div>
                              <div style={{ fontSize:10, color:G.muted }}>{f.growth}</div>
                            </div>
                          </div>
                        </Card>
                      ))}
                    </div>
                  </div>
                </div>

                <div style={{ marginBottom:14 }}>
                  <SLabel>What drove the growth — vehicle innovation vs segment shift? Click each firm</SLabel>
                  <div style={{ display:"flex", gap:10, marginBottom:10 }}>
                    {[{ type:"vehicle", label:"Vehicle / Product innovation", c:"#1d4ed8", bg:"#dbeafe" },
                      { type:"segment", label:"Segment mix shift", c:"#059669", bg:"#dcfce7" },
                      { type:"both", label:"Both", c:"#d97706", bg:"#fef3c7" }].map(d=>(
                      <span key={d.type} style={{ fontSize:11, fontWeight:600, background:d.bg, color:d.c, padding:"3px 10px", borderRadius:4 }}>● {d.label}</span>
                    ))}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                    {PERP_FIRMS.map(f=>(
                      <PerpCard key={f.firm} f={f} activePerp={activePerp} setActivePerp={setActivePerp} />
                    ))}
                  </div>
                </div>

                <Card style={{ background:"#0f1e2e", border:"none" }}>
                  <div style={{ color:"#5eead4", fontSize:13, fontWeight:800, marginBottom:10 }}>The Big Picture: Why Perpetual Capital Is the New Competitive Moat</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:20, fontSize:12, color:"#94a3b8", lineHeight:1.75 }}>
                    <div><strong style={{ color:"white" }}>For the manager</strong><br/>Perpetual capital = fees that compound without re-raise cycles. No "fundraising treadmill" every 3–5yr. Revenue visibility improves dramatically → higher valuation multiples for the listed manager entity itself. This is why BAM/BX/KKR trade at premium multiples to traditional PE firms.</div>
                    <div><strong style={{ color:"white" }}>For the LP</strong><br/>Perpetual vehicles (BDCs, non-traded REITs, insurance products) give retail/HNW investors access to alternative assets without the complexity of closed-end fund commitments. This opens up a massive new investor base — the wealth management channel — which is less rate-sensitive and more diversification-seeking than institutional LPs.</div>
                    <div><strong style={{ color:"white" }}>The insurance vs. retail vehicle distinction</strong><br/>Insurance float (Apollo/KKR) is the structurally superior form of perpetual capital — lower cost, self-growing, driven by demographic tailwinds. Retail perpetual vehicles (BREIT/BCRED) are distribution innovations — they work until markets stress (BREIT redemptions 2022 showed the limit). Insurance float has no redemption risk.</div>
                  </div>
                </Card>
              </div>
            )}

            <div style={{ borderTop:`1px solid ${G.border}`, marginTop:20, paddingTop:12, display:"flex", justifyContent:"space-between", color:G.muted, fontSize:11 }}>
              <span>Summit Management · BAM · BX · KKR · APO · CG · April 2026</span>
              <span>Sub-strategies · Segment composition · Perpetual capital · Credit growth drivers</span>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SegmentDeepDive />);
  </script>
</body>
</html>
